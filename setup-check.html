<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Prompt Gallery - Setup Check</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ef;
        --text: #171717;
        --muted: #66615a;
        --panel: #ffffff;
        --accent: #e94f37;
        --accent-dark: #a93424;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(233, 79, 55, 0.14), transparent 32rem),
          linear-gradient(135deg, #f7f4ef 0%, #ffffff 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 720px);
        padding: 48px;
        border: 1px solid rgba(23, 23, 23, 0.08);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(23, 23, 23, 0.1);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent-dark);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 6vw, 4.75rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 58ch;
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.7;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 30px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(233, 79, 55, 0.1);
        color: var(--accent-dark);
        font-weight: 800;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #10100f;
          --text: #f4f0e8;
          --muted: #b8afa4;
          --panel: #181715;
          --accent-dark: #ffad9f;
        }

        body {
          background:
            radial-gradient(circle at top left, rgba(233, 79, 55, 0.18), transparent 32rem),
            linear-gradient(135deg, #10100f 0%, #1b1a18 100%);
        }

        main {
          border-color: rgba(244, 240, 232, 0.1);
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        }
      }

      @media (max-width: 560px) {
        main {
          padding: 30px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Phase 1 setup</p>
      <h1>AI Prompt Gallery</h1>
      <p>
        Your project folder is ready. The next phase will add the real website structure,
        design system, and starter layout.
      </p>
      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        Setup check passed
      </div>
    </main>
  </body>
</html>
