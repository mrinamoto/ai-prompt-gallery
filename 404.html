<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found - AI Prompt Gallery</title>
    <script src="./assets/js/theme.js"></script>
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="container app-header__inner">
        <a class="brand" href="./index.html" aria-label="AI Prompt Gallery home">
          <span class="brand__mark">PG</span>
          <span class="brand__text">Prompt Gallery</span>
        </a>

        <div class="header-actions">
          <button class="icon-button" type="button" data-theme-toggle aria-label="Switch color theme">
            <svg class="icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 4V2m0 20v-2m8-8h2M2 12h2m13.66-5.66 1.41-1.41M4.93 19.07l1.41-1.41m0-11.32L4.93 4.93m14.14 14.14-1.41-1.41M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
            <svg class="icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20.5 15.5A8.5 8.5 0 0 1 8.5 3.5 7 7 0 1 0 20.5 15.5Z"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="section">
      <section class="container stack text-center mx-auto max-readable">
        <p class="eyebrow">404</p>
        <h1 class="text-balance">This prompt wandered off the board.</h1>
        <p class="lead">
          The page may have moved, or the link may be incomplete. Head back to discovery or search the gallery.
        </p>
        <div class="cluster justify-center">
          <a class="button button--primary" href="./index.html">Back home</a>
          <a class="button button--secondary" href="./search.html">Search prompts</a>
        </div>
      </section>
    </main>
  </body>
</html>
